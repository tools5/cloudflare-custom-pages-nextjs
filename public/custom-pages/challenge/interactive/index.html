  <script data-cf-theme-bootstrap>

  <style>
    *{box-sizing:border-box}html{font-family:Inter,"Helvetica Neue",Arial,sans-serif;color-scheme:light dark}body{margin:0;min-height:100vh;min-height:100svh;background:#f8fafc;color:#111827}html.dark body{background:#030712;color:#f9fafb}.shell{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4px 4px 8px}.card{width:min(100%,360px);background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 18px 45px rgba(15,23,42,.15);border:1px solid rgba(15,23,42,.08)}html.dark .card{background:#111827;border-color:#1f2937;box-shadow:0 18px 45px rgba(0,0,0,.45)}.header{position:relative;padding:12px 46px 12px 14px;background:linear-gradient(135deg,#eff6ff,#dbeafe)}html.dark .header{background:linear-gradient(135deg,rgba(30,64,175,.45),rgba(30,58,138,.18))}.theme{position:absolute;right:12px;top:12px;height:32px;min-width:32px;border:0;border-radius:999px;background:rgba(255,255,255,.62);color:#4b5563;box-shadow:0 1px 3px rgba(0,0,0,.12);cursor:pointer}html.dark .theme{background:rgba(3,7,18,.42);color:#e5e7eb}.theme-icon{display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700}html[data-cf-theme-mode="light"] .theme-light,html[data-cf-theme-mode="dark"] .theme-dark,html[data-cf-theme-mode="system"] .theme-system{display:inline-flex}.headrow{display:flex;align-items:center;gap:12px}.badge{width:46px;height:46px;border-radius:999px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;color:white;flex:0 0 auto;position:relative}.badge:before{content:"";position:absolute;inset:0;border-radius:inherit;background:#3b82f6;filter:blur(18px);opacity:.35;animation:pulse 2s ease-in-out infinite}.badge svg{position:relative}.subtitle{font-size:13px;font-weight:700;color:#64748b;line-height:1.3}html.dark .subtitle{color:#9ca3af}h1{margin:2px 0 0;font-size:21px;line-height:1.2;font-weight:800;letter-spacing:-.02em}.body{padding:12px;displ ackground:rgba(249,115,22,.18);overflow:hidden;position:relative}.line:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(249,115,22,.85),transparent);animation:flow 1.65s cubic-bezier(.4,0,.6,1) infinite}.footer{width:min(100%,360px);padding:4px 8px 0;text-align:center;color:#6b7280;font-size:12px;line-height:1.55}html.dark .footer{color:#9ca3af}.footer .dot{margin:0 6px;color:#9ca3af}@keyframes flow{0%{transform:translateX(-120%);opacity:0}20%,80%{opacity:1}100%{transform:translateX(120%);opacity:0}}@keyframes pulse{50%{opacity:.6}}@media (max-width:340px){.card,.footer{width:calc(100vw - 8px)}.header{padding-left:12px}h1{font-size:19px}.body{padding:10px;gap:10px}.challenge-viewport{--cf-widget-scale:.9;min-height:72px}.challenge-box{max-width:none;transform:scale(var(--cf-widget-scale))}.node{width:86px;padding-left:7px;padding-right:7px}}@media (max-height:700px){.shell{justify-content:flex-start}.header{padding-top:10px;padding-bottom:10px}.body{gap:10px}.footer{font-size:11.5px}}

<body>

  <script data-cf-theme-runtime>
(function(){var k='cf-theme-mode',modes=['system','light','dark'],mq=window.matchMedia?window.matchMedia('(prefers-color-scheme: dark)'):null,r=document.documentElement;function read(){try{var v=localStorage.getItem(k);return modes.indexOf(v)>=0?v:'system';}catch(e){return 'system';}}function apply(m){var d=m==='dark'||(m==='system'&&mq&&mq.matches);r.classList.toggle('dark',!!d);r.classList.toggle('light',!d);r.setAttribute('data-cf-theme-mode',m);var b=document.querySelectorAll('[data-cf-theme-toggle]');for(var i=0;i<b.length;i++){var t=m==='system'?'\u8ddf\u968f\u7cfb\u7edf\u4e3b\u9898':m==='dark'?'\u6df1\u8272\u6a21\u5f0f':'\u6d45\u8272\u6a21\u5f0f';b[i].setAttribute('title',t+'\uff0c\u70b9\u51fb\u5207\u6362');b[i].setAttribute('aria-label',t+'\uff0c\u70b9\u51fb\u5207\u6362');}}function set(m){try{localStorage.setItem(k,m)}catch(e){}apply(m)}document.addEventListener('click',function(e){var b=e.target&&e.target.closest?e.target.closest('[data-cf-theme-toggle]'):null;if(!b)return;e.preventDefault();var m=read();set(modes[(modes.indexOf(m)+1)%modes.length]);});if(mq){var l=function(){if(read()==='system')apply('system')};mq.addEventListener?mq.addEventListener('change',l):mq.addListener&&mq.addListener(l)}apply(read());})();
  </script>
</body>
